plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.nspnativeops'
version = '0.7.9'

android {
  namespace "expo.modules.nspnativeops"
  defaultConfig {
    versionCode 1
    versionName "0.7.9"
  }
  lintOptions {
    abortOnError false
  }
}

repositories {
  maven { url 'https://jitpack.io' }
}

dependencies {
  implementation 'com.github.omicronapps:7-Zip-JBinding-4Android:Release-16.02-2.03'
}
